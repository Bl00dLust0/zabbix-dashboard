# ============================================================
#  nginx/nginx.conf
#  nginx sits in front of both containers and routes traffic:
#
#  /api/*   →  http://backend:5000   (Node.js API)
#  /*       →  http://frontend:3000  (React dev server)
# ============================================================

server {
    listen 80;

    # ── API routes → backend container ──────────────────────
    # "backend" is the service name in docker-compose.yml.
    # Docker's internal DNS resolves "backend" to the container's IP.
    location /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;

        # Pass through the real client IP and host header
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # Disable buffering so streaming responses work
        proxy_buffering    off;
    }

    # ── Health check → backend ──────────────────────────────
    location /health {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Everything else → React dev server ──────────────────
    # "frontend" resolves to the frontend container on port 3000
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;

        # Required for React's WebSocket hot-reload to work
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;

        # If React dev server is slow to start, nginx waits up to 60s
        proxy_read_timeout 60s;
    }
}
